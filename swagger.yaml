openapi: 3.0.3
info:
  title: "Bận hay Lười? API"
  description: "API documentation for the Bận hay Lười? mobile application"
  version: "2.0.0"
  contact:
    name: "Development Team"
    email: "support@banhayluoi.app"

servers:
  - url: http://localhost:3000/api
    description: Local development server
  - url: https://backend-production-28f1.up.railway.app/api
    description: Production server

tags:
  - name: "Auth"
    description: "Authentication endpoints"
  - name: "Quiz & History"
    description: "Quiz submission and history management"
  - name: "Feedback"
    description: "User feedback submission"
  - name: Questions
    description: Lấy danh sách câu hỏi quiz

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
        username:
          type: string
        email:
          type: string
        displayName:
          type: string
        stats:
          $ref: '#/components/schemas/UserStats'
          
    UserStats:
      type: object
      properties:
        totalQuizzes:
          type: number
        currentStreak:
          type: number
        longestStreak:
          type: number
    
    Question:
      type: object
      properties:
        _id:
          type: string
        questionId:
          type: number
        group:
          type: string
          enum: [energy, work, psychology, environment]
        question:
          type: string
        hint:
          type: string
        options:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              emoji:
                type: string
              subtext:
                type: string
              score:
                type: number
        order:
          type: number
          
    History:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        state:
          type: string
          enum: [exhausted, tired, lazy_with_deadline, ready, focused, unmotivated]
        scores:
          $ref: '#/components/schemas/Scores'
        stateDetails:
          $ref: '#/components/schemas/StateDetails'
        createdAt:
          type: string
          format: date-time
          
    Scores:
      type: object
      properties:
        energy:
          type: number
        work:
          type: number
        psychology:
          type: number
        environment:
          type: number
        total:
          type: number
          
    StateDetails:
      type: object
      properties:
        name:
          type: string
        emoji:
          type: string
        color:
          type: string
        description:
          type: string
        recommendations:
          type: array
          items:
            type: string
          

security:
  - BearerAuth: []

paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
              properties:
                username:
                  type: string
                  minLength: 3
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                displayName:
                  type: string
      responses:
        201:
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      token:
                        type: string
        409:
          description: User already exists
          
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Login successful
        401:
          description: Invalid credentials
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Đăng xuất
      security:
        - BearerAuth: []
      responses:
        200:
          description: Đăng xuất thành công

  /auth/profile:
    put:
      tags:
        - Auth
      summary: Cập nhật profile và preferences
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                  example: "Nguyễn Văn A"
                preferences:
                  type: object
                  properties:
                    darkMode:
                      type: boolean
                      example: false
                    language:
                      type: string
                      enum: [vi, en]
                      example: "en"
                    notificationsEnabled:
                      type: boolean
                      example: true
                    reminderTime:
                      type: string
                      example: "21:30"
                    reminderFrequency:
                      type: string
                      enum: [daily, twice, custom]
                      example: "daily"
      responses:
        200:
          description: Cập nhật thành công

  /auth/change-password:
    put:
      tags:
        - Auth
      summary: Đổi mật khẩu
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  example: "123456"
                newPassword:
                  type: string
                  minLength: 6
                  example: "654321"
      responses:
        200:
          description: Đổi mật khẩu thành công
        401:
          description: Mật khẩu hiện tại không đúng

  /questions:
    get:
      tags:
        - Questions
      summary: Lấy danh sách 10 câu hỏi
      description: Trả về danh sách câu hỏi kèm options để frontend hiển thị. Có thể lọc theo `questionIds`.
      security:
        - BearerAuth: []
      parameters:
        - name: questionIds
          in: query
          required: false
          description: Danh sách questionId, phân tách bằng dấu phẩy. Ví dụ `1,2,3`
          schema:
            type: string
            example: "1,2,3"
      responses:
        200:
          description: Danh sách câu hỏi
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      questions:
                        type: array
                        items:
                          $ref: '#/components/schemas/Question'
                      total:
                        type: number
                        example: 10
                      groups:
                        type: array
                        items:
                          type: string
        400:
          description: `questionIds` không hợp lệ
        401:
          description: Chưa đăng nhập

  /questions/seed:
    post:
      tags:
        - Questions
      summary: Tạo 10 câu hỏi mẫu
      description: Chỉ cần gọi 1 lần để khởi tạo dữ liệu
      security:
        - BearerAuth: []
      responses:
        201:
          description: Đã tạo câu hỏi thành công
          
  /histories/submit:
    post:
      tags:
        - Quiz & History
      summary: Submit quiz answers and get results
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - answers
              properties:
                answers:
                  type: array
                  items:
                    type: object
                    properties:
                      questionId:
                        type: number
                      group:
                        type: string
                      selectedOption:
                        type: number
                      score:
                        type: number
                meta:
                  type: object
      responses:
        201:
          description: Quiz processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      history:
                        $ref: '#/components/schemas/History'
                        
  /histories:
    get:
      tags:
        - Quiz & History
      summary: Get user's quiz history
      parameters:
        - name: page
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: number
        - name: state
          in: query
          schema:
            type: string
      responses:
        200:
          description: History retrieved successfully
          
  /histories/{id}:
    get:
      tags:
        - Quiz & History
      summary: Get a specific history entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: History retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      history:
                        $ref: '#/components/schemas/History'
        404:
          description: History not found
    delete:
      tags:
        - Quiz & History
      summary: Delete a specific history entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: History deleted
        404:
          description: History not found
          
  /feedback:
    post:
      tags:
        - Feedback
      summary: Submit feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - title
                - description
              properties:
                type:
                  type: string
                  enum: [bug, feature, improvement, other]
                severity:
                  type: string
                  enum: [critical, major, minor, suggestion]
                title:
                  type: string
                description:
                  type: string
      responses:
        201:
          description: Feedback submitted
